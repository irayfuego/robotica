### robot_eyes_params.yaml — Configuración de los ojos del robot
# Pantallas: 2× GC9A01 240×240 round, conectadas por SPI0 a la RPi 4B
#
# Cableado por defecto:
#   Left eye  → SPI0 CS0 (GPIO 8)
#   Right eye → SPI0 CS1 (GPIO 7)
#   DC        → GPIO 25
#   RST       → GPIO 27
#   BL        → GPIO 18  (PWM backlight)
#   MOSI      → GPIO 10
#   SCLK      → GPIO 11

robot_eyes_node:
  ros__parameters:
    fps:        30          # Hz de render
    sim_mode:   false       # true = sin pantallas reales (test en PC)
    auto_idle:  true        # parpadeo y miradas aleatorias en reposo

    # Segundos sin actualizacion de emocion antes de volver a neutral
    emotion_timeout: 8.0

    # La inclinacion del parpado (la "V" de enfado, la caida triste) se
    # espeja entre ojos. Si por el montaje fisico de las pantallas se ve
    # invertida (el enfado parece pena), pon true en vez de recablear.
    tilt_swap: false

    # Text-to-speech via espeak-ng.
    # Publica en /robot/say (std_msgs/String) para hacer hablar al robot.
    # Voces disponibles: es (espanol), es-la (latinoamerica), en, fr, de, it
    # Velocidad en palabras por minuto: 80=lento, 130=normal, 170=rapido
    tts_voice:  "es"
    tts_speed:  130
    # El robot habla por el altavoz de la HuskyLens (huskylens_tts_node).
    # Pon tts_local: true solo si conectas un altavoz al jack/HDMI del Pi.
    tts_local:  false

    # Color del iris  [R, G, B]  0-255
    iris_color: [60, 120, 200]

    # Color de fondo fuera del círculo del ojo
    background: [10, 10, 15]

    # Configuración SPI / GPIO
    display_config:
      spi_bus:    0
      dc_pin:     25
      rst_pin:    27
      bl_pin:     18
      spi_speed:  40000000   # 40 MHz

huskylens_gaze_bridge:
  ros__parameters:
    i2c_bus:    1          # I2C bus (SDA=GPIO2, SCL=GPIO3)
    hz:         20         # Hz de polling
    hl_width:   640        # Resolucion horizontal HuskyLens 2
    hl_height:  480        # Resolucion vertical HuskyLens 2

    # --- Modo de operacion ---
    # algo: 3   -> Object Tracking: ojos siguen el objeto aprendido.
    #             Sin boton fisico: llamar al servicio ROS para aprender:
    #               ros2 service call /huskylens/learn std_srvs/Trigger
    #             Para olvidar el objeto:
    #               ros2 service call /huskylens/forget std_srvs/Trigger
    # algo: 13  -> Face Emotion Recognition: ojos siguen la cara y publican emocion.
    #             No requiere aprendizaje.
    algo:       13

    # Mapa de emociones (solo se usa cuando algo=13).
    # Ajusta los IDs si tu firmware los tiene en orden diferente (ver logs).
    emotion_map: "1:neutral,2:happy,3:sad,4:surprised,5:angry,6:confused,7:suspicious"

# TTS por el altavoz de la HuskyLens.
# Publica texto en /robot/say (std_msgs/String) y se oye por la camara:
#   ros2 topic pub --once /robot/say std_msgs/msg/String "{data: 'hola'}"
# Flujo: Piper TTS -> WAV -> sox a MP3 -> ssh cat a la HuskyLens -> play_music (MCP).
huskylens_tts_node:
  ros__parameters:
    husky_host:          "192.168.1.32"        # IP de la HuskyLens
    husky_mcp_port:      3000                   # puerto del MCP server del firmware
    husky_ssh_user:      "root"                 # SSH root sin password ya configurado
    husky_audio_dir:     "/opt/user/mtp/audio"  # carpeta de audio en la HuskyLens
    # Piper TTS (voz neuronal). Modelo descargado en /home/mimavi/piper-voices/
    # Otras voces disponibles en: https://huggingface.co/rhasspy/piper-voices
    piper_model:         "/home/mimavi/piper-voices/es_ES-davefx-medium.onnx"
    piper_binary:        ""          # vacio = python3 -m piper (instalado con pip)
    piper_length_scale:  1.0         # velocidad: 0.8=rapido 1.0=normal 1.2=lento
    tts_speed:           130         # solo para estimar duracion de mute en voice_command_node
    volume:              90          # volumen de reproduccion 0-100
    tmp_dir:             "/tmp"      # carpeta temporal en el Pi
    ring_slots:          4           # nombres MP3 rotativos (anti-pisado)

# Comandos de voz en lenguaje natural, siempre activos.
# Microfono de la HuskyLens (grabado via su MCP) + Vosk offline en el Pi.
# Habla cerca de la camara; el robot reacciona con emocion / habla.
# La transcripcion cruda se publica en /robot/voice_raw.
voice_command_node:
  ros__parameters:
    husky_host:        "192.168.1.32"        # IP de la HuskyLens
    husky_mcp_port:    3000                   # puerto del MCP server del firmware
    husky_ssh_user:    "root"                 # SSH root sin password ya configurado
    husky_audio_dir:   "/opt/user/mtp/audio"  # carpeta de audio en la HuskyLens
    model_path:        "/home/mimavi/vosk-model-es"  # modelo Vosk espanol
    window_sec:        3                       # duracion de cada ventana (frases cortas caben)
    rec_margin:        3.2                     # seg extra para que el firmware cierre el MP3
                                               # (medido ~2.9s; menos margen ABORTA la grabacion)
    sample_rate:       16000                   # Hz (mono) que espera Vosk
    vad_rms_threshold: 0.010                   # umbral de energia para detectar voz
    wake_word:         "robot"                 # NLU hibrido: sin esta palabra solo
                                               # reglas locales (gratis); "robot ..."
                                               # invoca a Gemini (lenguaje natural).
                                               # Vacio = nunca llama a Gemini (solo reglas)
    self_mute_margin:  1.5                     # seg extra de mute tras hablar (anti-eco)
    tts_speed:         130                     # debe coincidir con el TTS (estima mute)
    tmp_dir:           "/tmp"                  # carpeta temporal en el Pi
    enabled:           true                    # false para desactivar la escucha
    # Clave de API de Gemini para NLU avanzado (LLM en lugar de palabras clave).
    # NO poner el valor real aqui: este fichero esta en el repo publico.
    # Alternativa recomendada: Environment=GEMINI_API_KEY=tu_clave en el
    # fichero de servicio systemd (o un drop-in en
    # /etc/systemd/system/robot_eyes.service.d/gemini.conf).
    gemini_api_key:    ""
    # Modelo Gemini a usar. Opciones recomendadas (menor a mayor coste):
    #   gemini-2.5-flash-lite   <- defecto, ideal para comandos cortos
    #   gemini-2.5-flash
    #   gemini-3.1-flash-lite
    gemini_model:      "gemini-2.5-flash-lite"
